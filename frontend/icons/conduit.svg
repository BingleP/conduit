<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background gradient: dark blue-gray -->
    <linearGradient id="bg-g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e2230"/>
      <stop offset="100%" stop-color="#12141c"/>
    </linearGradient>

    <!-- Flow gradient: blue → purple, horizontal across the symbol area -->
    <linearGradient id="flow-g" x1="100" y1="0" x2="470" y2="0"
                    gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4f8ef7"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>

    <!-- Subtle glow to give depth -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded-square background -->
  <rect width="512" height="512" rx="112" fill="url(#bg-g)"/>

  <!--
    C-arc  (the conduit / pipe)
    Center: (256, 256)   Radius: 155   Stroke-width: 56
    Gap on the right at ±45° — top of gap (366,146), bottom (366,366)
    Path: large arc, counterclockwise (sweep=0) from top to bottom
  -->
  <path d="M 366 146 A 155 155 0 1 0 366 366"
        fill="none"
        stroke="url(#flow-g)"
        stroke-width="56"
        stroke-linecap="round"
        filter="url(#glow)"/>

  <!--
    Arrow through the gap — a short rightward line plus a chevron head.
    Positioned in the clear opening to the right of the arc.
    Line starts near the inner edge of the arc (≈x 398) and ends past
    the outer edge (≈x 450).  Chevron head meets at (455, 256).
  -->
  <line x1="395" y1="256" x2="445" y2="256"
        stroke="url(#flow-g)"
        stroke-width="30"
        stroke-linecap="round"
        filter="url(#glow)"/>

  <polyline points="418,220 458,256 418,292"
            fill="none"
            stroke="url(#flow-g)"
            stroke-width="30"
            stroke-linecap="round"
            stroke-linejoin="round"
            filter="url(#glow)"/>
</svg>
