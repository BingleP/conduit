name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-installer:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build Windows installer
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          & $iscc "/DMyAppVersion=${{ steps.version.outputs.version }}" conduit.iss
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Create source archive
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          git archive --format=zip --output="dist/conduit-$version-source.zip" HEAD

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Conduit ${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/conduit-${{ steps.version.outputs.version }}-setup.exe
            dist/conduit-${{ steps.version.outputs.version }}-source.zip
