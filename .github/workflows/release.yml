name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build Windows installer
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          & $iscc "/DMyAppVersion=${{ steps.version.outputs.version }}" conduit.iss
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Create source archive
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          git archive --format=zip --output="dist/conduit-$version-source.zip" HEAD

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: |
            dist/conduit-${{ steps.version.outputs.version }}-setup.exe
            dist/conduit-${{ steps.version.outputs.version }}-source.zip
          if-no-files-found: error

  build-appimage:
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Linux packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            patchelf \
            desktop-file-utils \
            libglib2.0-0 \
            libxkbcommon0 \
            libegl1 \
            libopengl0 \
            libdbus-1-3 \
            libnss3 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libgbm1 \
            libasound2 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libgtk-3-0 \
            libxcb1 \
            libx11-xcb1

      - name: Build AppImage
        run: |
          chmod +x scripts/build-appimage.sh packaging/appimage/AppRun
          scripts/build-appimage.sh "${{ steps.version.outputs.version }}"

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-appimage
          path: dist/Conduit-${{ steps.version.outputs.version }}-x86_64.AppImage
          if-no-files-found: error

  build-macos-dmg:
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build unsigned macOS DMG
        run: |
          chmod +x scripts/build-macos-dmg.sh
          scripts/build-macos-dmg.sh "${{ steps.version.outputs.version }}"

      - name: Upload macOS DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-dmg
          path: dist/Conduit-${{ steps.version.outputs.version }}-macos.dmg
          if-no-files-found: error

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-appimage
      - build-macos-dmg
    permissions:
      contents: write

    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-windows
          path: release-assets/windows

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: release-linux-appimage
          path: release-assets/linux

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: release-macos-dmg
          path: release-assets/macos

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Conduit ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release-assets/windows/*
            release-assets/linux/*
            release-assets/macos/*
